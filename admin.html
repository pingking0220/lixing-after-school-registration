<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>課後照顧班報名後台</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="admin.css">
  </head>
  <body>
    <main class="admin-login-shell" id="adminLogin">
      <section class="admin-login-panel">
        <p class="kicker">力行國小課後照顧班</p>
        <h1>後台登入</h1>
        <form id="adminLoginForm">
          <label class="field">
            <span>後台帳號 Email</span>
            <input type="email" name="adminEmail" autocomplete="username" required>
          </label>
          <label class="field">
            <span>後台密碼</span>
            <input type="password" name="adminPassword" autocomplete="current-password" required>
          </label>
          <button class="primary-button" type="submit">登入後台</button>
          <p id="loginMessage" class="settings-message" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <main class="admin-shell" id="adminApp" hidden>
      <header class="admin-header">
        <div>
          <p class="kicker">力行國小課後照顧班</p>
          <h1>報名狀況後台</h1>
        </div>
        <div class="admin-actions">
          <a class="ghost-link" href="index.html">前台報名</a>
          <button class="ghost-link" id="logoutButton" type="button">登出</button>
          <button class="primary-link" id="exportCsvButton" type="button">匯出 CSV</button>
        </div>
      </header>

      <section class="settings-panel">
        <div>
          <h2>報名期別設定</h2>
          <p>設定後，前台會自動依此判斷學生報名時的年級與年段。</p>
        </div>
        <form id="settingsForm" class="settings-form">
          <label>
            <span>目前報名期別</span>
            <select name="registrationTerm" required>
              <option value="nextYearFirst">下一學年度上學期：學生升一個年級</option>
              <option value="sameYearSecond">同學年度下學期：學生維持目前年級</option>
            </select>
          </label>
          <button class="primary-button" type="submit">儲存設定</button>
          <p id="settingsMessage" class="settings-message" aria-live="polite"></p>
        </form>
      </section>

      <section class="settings-panel">
        <div>
          <h2>招生簡章設定</h2>
          <p>目前前台使用：<a id="currentBrochureLink" href="#" target="_blank" rel="noopener">載入中</a></p>
        </div>
        <form id="brochureForm" class="settings-form" enctype="multipart/form-data">
          <label>
            <span>更換簡章 PDF</span>
            <input type="file" name="brochure" accept="application/pdf,.pdf" required>
          </label>
          <button class="primary-button" type="submit">上傳簡章</button>
          <p id="brochureMessage" class="settings-message" aria-live="polite"></p>
        </form>
      </section>

      <section class="stat-grid" aria-label="報名統計">
        <article>
          <span>總報名數</span>
          <strong id="totalCount">0</strong>
        </article>
        <article>
          <span>延長班人數</span>
          <strong id="extendedCount">0</strong>
        </article>
        <article>
          <span>年段分布</span>
          <strong id="bandSummary">-</strong>
        </article>
        <article>
          <span>午餐概況</span>
          <strong id="lunchSummary">-</strong>
        </article>
      </section>

      <section class="admin-table-panel">
        <div class="table-toolbar">
          <h2>報名清單</h2>
          <input id="searchBox" type="search" placeholder="搜尋學生、班級、家長或電話">
        </div>
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>編號</th>
                <th>送出時間</th>
                <th>學生</th>
                <th>班級</th>
                <th>報名年段</th>
                <th>課後照顧班</th>
                <th>延長班</th>
                <th>午餐</th>
                <th>減免</th>
                <th>家長聯絡</th>
              </tr>
            </thead>
            <tbody id="registrationRows">
              <tr>
                <td colspan="10">載入中</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script type="module" src="admin.js"></script>
  </body>
</html>
